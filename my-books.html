<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Books | DigiLib</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DigiLib">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2702/2702134.png">
</head>
<body style="background: radial-gradient(circle at top right, rgba(124, 58, 237, 0.08), transparent), radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.05), transparent); min-height: 100vh;">
    <nav class="navbar">
        <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" class="logo">
                <div class="logo-icon">
                    <i class="fas fa-bolt"></i>
                </div>
                <span>Velvet</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Edition</a></li>
                <li id="my-books-link" class="active"><a href="my-books.html">Library</a></li>
                <li id="admin-link" style="display: none;"><a href="admin.html">Portal</a></li>
                <li id="user-profile">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <span id="user-email" style="font-weight: 700; font-size: 0.9rem; opacity: 0.8;"></span>
                        <button id="logout-btn" class="btn btn-outline btn-sm" style="padding: 8px 15px;"><i class="fas fa-power-off"></i></button>
                    </div>
                </li>
            </ul>
        </div>
    </nav>

    <div class="section" style="padding-top: 180px;">
        <div class="container">
            <h1 class="section-title" style="margin-bottom: 24px;">Your Private Collection</h1>
            <p class="text-center mb-5" style="color: var(--text-dim); font-size: 1.2rem; font-weight: 400;">Access your authenticated premium digital editions.</p>
            
            <div id="my-books-list" class="features-grid" style="margin-top: 80px;">
                <div class="loader" style="margin: 0 auto;"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-info">
                    <h3>DigiLib</h3>
                    <p>Providing exclusive access to premium digital content.</p>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="auth.html">Login</a></li>
                    </ul>
                </div>
                <div class="footer-social">
                    <h4>Follow Us</h4>
                    <div class="social-icons">
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 DigiLib. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/my-books.js"></script>
</body>
</html>
