<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | DigiLib</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    
    <!-- PWA Support -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6c5ce7">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="DigiLib">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2702/2702134.png">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fas fa-book-open"></i> DigiLib
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="catalog.html">Catalog</a></li>
                <li id="my-books-link" style="display: none;"><a href="my-books.html">My Books</a></li>
                <li id="cart-link" class="active"><a href="cart.html"><i class="fas fa-shopping-cart"></i> <span id="cart-count">0</span></a></li>
                <li id="admin-link" style="display: none;"><a href="admin.html">Admin</a></li>
                <li id="user-profile" style="display: none;">
                    <span id="user-email"></span>
                    <button id="logout-btn" class="btn btn-outline btn-sm">Logout</button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="section">
        <div class="container">
            <h1 class="section-title">Your Shopping Cart</h1>
            
            <div id="cart-items" class="admin-table-container">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Book</th>
                            <th>Price (Birr)</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="cart-table-body">
                        <!-- Items loaded here -->
                    </tbody>
                </table>
                <div class="cart-summary mt-4 text-right" style="text-align: right; padding: 20px;">
                    <h3>Total: <span id="cart-total">0</span> Birr</h3>
                    <button id="checkout-btn" class="btn btn-primary btn-lg mt-3">Checkout All</button>
                </div>
            </div>

            <div id="empty-cart" style="display: none;" class="text-center">
                <p>Your cart is empty.</p>
                <a href="catalog.html" class="btn btn-primary mt-3">Browse Books</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="js/firebase-config.js"></script>
    <script src="js/main.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
